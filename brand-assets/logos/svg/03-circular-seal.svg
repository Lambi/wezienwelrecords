<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="WeZienWel Records circular seal">
  <title>WeZienWel Records · Circular Seal</title>
  <desc>A stamp-style seal with a bold WZW monogram centred on a double ring, framed by the label motto.</desc>

  <rect width="600" height="600" fill="#F2EEE5"/>

  <!-- outer rings -->
  <circle cx="300" cy="300" r="285" fill="none" stroke="#0E0E0C" stroke-width="5"/>
  <circle cx="300" cy="300" r="268" fill="none" stroke="#0E0E0C" stroke-width="1.5"/>
  <!-- red disk -->
  <circle cx="300" cy="300" r="200" fill="#E23D28" stroke="#0E0E0C" stroke-width="3"/>

  <!-- stacked wordmark inside disk -->
  <g font-family="'EB Garamond', 'URW Bookman', 'DejaVu Serif', Georgia, serif" font-style="italic" font-weight="800" fill="#F2EEE5" text-anchor="middle">
    <text x="300" y="250" font-size="82">We</text>
    <text x="300" y="325" font-size="82">Zien</text>
    <text x="300" y="400" font-size="82">Wel</text>
  </g>

  <!-- top label (inside outer ring, above red disk) -->
  <text x="300" y="62" text-anchor="middle"
        font-family="'Space Grotesk', 'Lato', sans-serif"
        font-weight="700" font-size="18" letter-spacing="3" fill="#0E0E0C">WEZIENWEL RECORDS</text>
  <text x="300" y="84" text-anchor="middle"
        font-family="'Space Grotesk', 'Lato', sans-serif"
        font-weight="500" font-size="11" letter-spacing="2" fill="#0E0E0C">SOUND &amp; FRIENDSHIP · EST 2019</text>

  <!-- bottom label -->
  <text x="300" y="536" text-anchor="middle"
        font-family="'Space Grotesk', 'Lato', sans-serif"
        font-weight="700" font-size="16" letter-spacing="4" fill="#0E0E0C">INDEPENDENT LABEL</text>
  <text x="300" y="558" text-anchor="middle"
        font-family="'Space Grotesk', 'Lato', sans-serif"
        font-weight="500" font-size="11" letter-spacing="2" fill="#0E0E0C">HOUSE · DEEP · JAZZ · JAM</text>

  <!-- side rules -->
  <g stroke="#0E0E0C" stroke-width="2">
    <line x1="60" y1="300" x2="95" y2="300"/>
    <line x1="505" y1="300" x2="540" y2="300"/>
  </g>

  <!-- corner dots -->
  <g fill="#E23D28">
    <circle cx="300" cy="30" r="5"/>
    <circle cx="300" cy="570" r="5"/>
    <circle cx="30" cy="300" r="5"/>
    <circle cx="570" cy="300" r="5"/>
  </g>
</svg>
