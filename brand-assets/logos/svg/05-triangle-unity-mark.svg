<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 820" role="img" aria-label="WeZienWel Records triangle unity mark">
  <title>WeZienWel Records · Triangle Unity Mark</title>
  <desc>Two interlocking triangles with a red core — a geometric unity mark above an italic serif wordmark.</desc>

  <rect width="600" height="820" fill="#F2EEE5"/>

  <!-- Two interlocking equilateral triangles forming a hexagram, with a red central triangle -->
  <g stroke="#0E0E0C" stroke-width="14" stroke-linejoin="miter" stroke-linecap="square">
    <!-- triangle 1 : apex up -->
    <polygon points="300,100 110,440 490,440" fill="none"/>
    <!-- triangle 2 : apex down -->
    <polygon points="110,240 490,240 300,580" fill="none"/>
    <!-- central red triangle (apex up) -->
    <polygon points="300,250 205,410 395,410" fill="#E23D28"/>
  </g>

  <!-- center dot -->
  <circle cx="300" cy="373" r="10" fill="#F2EEE5" stroke="#0E0E0C" stroke-width="3"/>

  <!-- wordmark -->
  <text x="300" y="680" text-anchor="middle"
        font-family="'EB Garamond', 'URW Bookman', 'DejaVu Serif', Georgia, serif"
        font-style="italic" font-weight="800" font-size="88" fill="#0E0E0C">WeZienWel</text>

  <!-- red rule -->
  <rect x="180" y="700" width="240" height="4" fill="#E23D28"/>

  <text x="300" y="740" text-anchor="middle"
        font-family="'Space Grotesk', 'Lato', sans-serif"
        font-weight="600" font-size="24" letter-spacing="8" fill="#0E0E0C">RECORDS</text>
  <text x="300" y="772" text-anchor="middle"
        font-family="'Space Grotesk', 'Lato', sans-serif"
        font-weight="500" font-size="14" letter-spacing="4" fill="#0E0E0C">INDEPENDENT · SINCE 2019</text>
</svg>
